name: Automatizacion Morningstar Playwright

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * 1-5' # Se ejecuta de lunes a viernes a las 23:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar librerías y dependencias de navegador
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl playwright lxml html5lib beautifulsoup4
        playwright install --with-deps chromium # Instala el navegador virtual dentro de Ubuntu

    - name: Ejecutar Scraper Real
      run: python scraper_morningstar.py

    - name: Guardar el archivo Excel en GitHub
      run: |
        git config --global user.name 'Morningstar Playwright Bot'
        git config --global user.email 'bot@morningstar-scraper.com'
        git add lista_completa_etfs_morningstar.xlsx
        git commit -m "Actualización nativa de ETFs desde buscador Morningstar" || echo "No hay cambios hoy"
        git push
